<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市集叫號顯示器 (滿版大字版)</title>

    <script>
        window.MARKET_CONFIG = {
            firebase: {
  apiKey: "AIzaSyCrXoKUHMvQ8LMr_YuaQYTWEdLfWFYeLYY",
  authDomain: "jiantou-000rlhad.firebaseapp.com",
  databaseURL: "https://jiantou-000rlhad-default-rtdb.firebaseio.com",
  projectId: "jiantou-000rlhad",
  storageBucket: "jiantou-000rlhad.firebasestorage.app",
  messagingSenderId: "435285773521",
  appId: "1:435285773521:web:d6ce66a7d35bf3bbd049f0"

            }
        };
    </script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        :root { --color-primary: #9E5A5A; }
        body { font-family: 'Noto Sans TC', sans-serif; }
        .serif { font-family: 'Noto Serif TC', serif; }
        .text-primary { color: var(--color-primary); }
        .bg-primary { background-color: var(--color-primary); }
        .border-primary { border-color: var(--color-primary); }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .number-pop { animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        [v-cloak] { display: none !important; }
        .marquee-container { width: 100%; overflow: hidden; white-space: nowrap; position: relative; }
        .marquee-content { display: inline-block; padding-left: 100%; animation: marquee 25s linear infinite; }
        .marquee-content-fast { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body class="bg-stone-900 h-screen overflow-hidden text-stone-400 select-none flex flex-col">

<div id="app" v-cloak class="h-full flex flex-col relative w-full">
    
    <audio id="dingSound" src="https://github.com/d930yao-create/jiantou/raw/refs/heads/main/image/mixkit-home-standard-ding-dong-109.wav" preload="auto"></audio>

<div class="absolute top-4 left-4 z-50 flex items-center gap-2 px-3 py-1.5 rounded-full bg-stone-800/80 border border-stone-600 shadow-lg">
        <div class="w-2 h-2 rounded-full" :class="isConnected ? 'bg-green-500 shadow-[0_0_8px_#22c55e]' : 'bg-red-500 animate-ping'"></div>
        <span class="text-[10px] font-bold text-stone-300">{{ isConnected ? '連線正常' : '連線中斷' }}</span>
    </div>

    <div class="absolute top-16 left-4 z-50 flex flex-col gap-3">
        <button @click="toggleMute" class="p-3 rounded-full bg-stone-800/80 text-white hover:bg-stone-700 transition-colors border border-stone-600 shadow-lg active:scale-95">
            <span class="material-icons-round text-2xl">{{ isMuted ? 'volume_off' : 'volume_up' }}</span>
        </button>
        <button @click="toggleFullScreen" class="p-3 rounded-full bg-stone-800/80 text-white hover:bg-stone-700 transition-colors border border-stone-600 shadow-lg active:scale-95">
            <span class="material-icons-round text-2xl">fullscreen</span>
        </button>
        <button @click="clearAll" class="p-3 rounded-full bg-primary/80 text-white hover:bg-primary transition-colors border border-stone-600 shadow-lg active:scale-95 flex items-center justify-center">
            <span class="material-icons-round text-2xl">delete_sweep</span>
        </button>
    </div>

    <div class="w-full bg-stone-950/90 border-b border-stone-800/50 py-3 z-20 flex-shrink-0 shadow-lg">
        <div class="marquee-container">
            <span class="marquee-content text-2xl tracking-widest text-stone-300 font-medium">📢 {{ finalMarqueeText }}</span>
        </div>
    </div>

    <div @click="completeCurrent" class="flex-1 flex flex-col items-center justify-center relative bg-stone-900 z-10 cursor-pointer active:bg-stone-800 transition-colors group">
        <div class="absolute top-8 text-stone-500 tracking-[0.8em] text-lg uppercase opacity-50 font-bold">Current Call</div>
        <p class="text-3xl mb-4 font-light tracking-widest text-stone-400">🙌 餐點現點現做，感謝耐心等候 🙌</p>
        
        <div :key="currentNumber" class="number-pop flex items-center justify-center my-4">
            <h1 class="text-[38vw] leading-none font-black serif text-yellow-400 group-hover:scale-105 transition-transform" :class="currentNumber ? 'animate-pulse' : ''" style="text-shadow: 0 0 80px rgba(250, 204, 21, 0.7), 0 0 20px rgba(250, 204, 21, 0.4);">
                {{ currentNumber || '--' }}
            </h1>
        </div>
        
        <div class="mt-8 h-24 flex items-center justify-center">
            <span v-if="currentNumber" class="text-5xl text-stone-100 bg-white/10 px-16 py-6 rounded-full backdrop-blur-md flex items-center gap-4 border border-white/20 shadow-2xl">
                <span class="material-icons-round text-yellow-400 text-5xl">lightbulb</span>請至櫃台取餐
            </span>
            <span v-else class="text-4xl text-stone-600 tracking-widest font-bold">美味準備中...</span>
        </div>
    </div>

    <div class="w-full bg-primary/20 border-t border-primary/40 py-5 z-20 flex-shrink-0 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
        <div class="marquee-container">
            <span class="marquee-content-fast text-4xl tracking-[0.15em] font-bold" :class="readyNumbersText === '目前無其他待取餐號碼' ? 'text-stone-400' : 'text-yellow-400'">
                {{ readyNumbersText }}
            </span>
        </div>
    </div>

</div>

<script type="module">
    import { createApp, ref, computed, onMounted, watch } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref as dbRef, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 🚀 統一從這裡抓資料！
    const app = initializeApp(window.MARKET_CONFIG.firebase);
    const db = getDatabase(app);

    createApp({
        setup() {
const isConnected = ref(true);
            const currentNumber = ref(null);
            const allRawDoneOrders = ref([]); 
            const doneOrders = ref([]);
            
            const isMuted = ref(true);
            const marqueeData = ref({ text: '', showCount: false, count: 0 });

            const toggleMute = () => {
                isMuted.value = !isMuted.value;
                if (!isMuted.value) {
                    const audio = document.getElementById('dingSound');
                    if (audio) {
                        audio.volume = 1;
                        audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(e => console.log('解鎖音效失敗', e));
                    }
                    const unlockSpeech = new SpeechSynthesisUtterance(' ');
                    window.speechSynthesis.speak(unlockSpeech);
                }
            };

            onMounted(() => {
onValue(dbRef(db, '.info/connected'), (snap) => { isConnected.value = snap.val() === true; });
                const callRef = dbRef(db, 'currentCallingNumber');
                onValue(callRef, (snapshot) => { currentNumber.value = snapshot.val(); });

                onValue(dbRef(db, 'marqueeData'), (snapshot) => { 
                    const data = snapshot.val();
                    if (data) marqueeData.value = data; 
                });

                const ordersRef = dbRef(db, 'orders');
                onValue(ordersRef, (snapshot) => {
                    const data = snapshot.val();
                    const list = [];
                    const todayStr = `${new Date().getFullYear()}/${(new Date().getMonth()+1).toString().padStart(2,'0')}/${new Date().getDate().toString().padStart(2,'0')}`;

                    if (data) {
                        Object.keys(data).forEach(key => {
                            const order = data[key];
                            if (order.status === 'done' && order.dateString === todayStr && !order.isAddon) {
                                list.push({ ...order, key: key });
                            }
                        });
                    }
                    list.sort((a, b) => b.createdAt - a.createdAt);
                    
                    allRawDoneOrders.value = list;
                    const uniqueNumbers = new Map();
                    list.forEach(o => { if (!uniqueNumbers.has(o.number)) uniqueNumbers.set(o.number, o); });
                    doneOrders.value = Array.from(uniqueNumbers.values());
                });
            });

            const finalMarqueeText = computed(() => {
                let text = marqueeData.value.text || ''; let showCount = marqueeData.value.showCount; let count = marqueeData.value.count || 0;
                let parts = [];
                if (text) parts.push(text);
                if (showCount) {
                    if (count > 0) parts.push(`🧑‍🍳 廚房目前有 ${count} 張訂單製作中，感謝您的耐心等候`);
                    else parts.push(`✨ 目前無需等候，速速為您出餐`);
                }
                if (parts.length === 0) return '歡迎光臨！請掃描前方 QRCode 點餐 📱';
                return parts.join(' ｜ ');
            });

            const recentDoneOrders = computed(() => { return doneOrders.value.filter(o => String(o.number) !== String(currentNumber.value)); });

            const readyNumbersText = computed(() => {
                if (recentDoneOrders.value.length === 0) return '目前無其他待取餐號碼';
                const nums = recentDoneOrders.value.map(o => `#${o.number}`).join('、');
                return `✅ 以下號碼皆可取餐： ${nums} 👈 請盡速至櫃檯領取您的美味餐點！`;
            });

            watch(currentNumber, (newVal) => {
                if (newVal && !isMuted.value) {
                    const audio = document.getElementById('dingSound');
                    if(audio) { audio.play().catch(() => {}); }

                    setTimeout(() => {
                        const spacedNumber = String(newVal).split('').join(' ');
                        const speechText = `${spacedNumber} 號，請至櫃檯取餐`;
                        const utterance = new SpeechSynthesisUtterance(speechText);
                        utterance.lang = 'zh-TW'; utterance.rate = 0.85; utterance.pitch = 1.2;  
                        window.speechSynthesis.speak(utterance);
                    }, 1000); 
                }
            });

            const completeCurrent = () => {
                if (!currentNumber.value) return;
                const targets = allRawDoneOrders.value.filter(o => String(o.number) === String(currentNumber.value));
                if (targets.length > 0) {
                    const updates = {};
                    targets.forEach(order => { updates[`orders/${order.key}/status`] = 'archived'; });
                    updates['currentCallingNumber'] = null;
                    update(dbRef(db), updates);
                } else {
                    set(dbRef(db, 'currentCallingNumber'), null);
                }
            };

            const clearAll = () => {
                if(confirm("確定要清除畫面上所有的取餐號碼嗎？（這些號碼都會被標記為已取餐）")) {
                    const updates = {};
                    updates['currentCallingNumber'] = null;
                    allRawDoneOrders.value.forEach(o => { updates[`orders/${o.key}/status`] = 'archived'; });
                    update(dbRef(db), updates).then(() => { currentNumber.value = null; });
                }
            };

            const toggleFullScreen = () => {
                const doc = window.document; const docEl = doc.documentElement;
                const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullscreen || docEl.msRequestFullscreen;
                const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;
                if(!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                    if(requestFullScreen) requestFullScreen.call(docEl);
                } else {
                    if(cancelFullScreen) cancelFullScreen.call(doc);
                }
            };

            return { 
                currentNumber, completeCurrent, isMuted, toggleFullScreen, toggleMute, clearAll, finalMarqueeText, readyNumbersText, isConnected,
            };
        }
    }).mount('#app');
</script>
</body>
</html>
