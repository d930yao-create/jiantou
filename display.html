<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>叫號顯示器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .serif { font-family: 'Noto Serif TC', serif; }
        .text-brick { color: #9E5A5A; }
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .number-pop { animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .list-enter-active, .list-leave-active { transition: all 0.4s ease; }
        .list-enter-from, .list-leave-to { opacity: 0; transform: translateX(30px); }
        [v-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-stone-900 h-screen overflow-hidden text-stone-400 select-none">

<div id="app" v-cloak class="h-full flex relative">
    
    <audio id="dingSound" src="https://github.com/d930yao-create/jiantou/raw/refs/heads/main/image/mixkit-home-standard-ding-dong-109.wav" preload="auto"></audio>

    <div class="absolute top-4 left-4 z-50 flex gap-3">
        <button @click="toggleMute" class="p-3 rounded-full bg-stone-800/80 text-white hover:bg-stone-700 transition-colors border border-stone-600 shadow-lg active:scale-95">
            <span class="material-icons-round text-2xl">{{ isMuted ? 'volume_off' : 'volume_up' }}</span>
        </button>
        <button @click="toggleFullScreen" class="p-3 rounded-full bg-stone-800/80 text-white hover:bg-stone-700 transition-colors border border-stone-600 shadow-lg active:scale-95">
            <span class="material-icons-round text-2xl">fullscreen</span>
        </button>
        <button @click="clearAll" class="p-3 rounded-full bg-brick/90 text-white hover:bg-red-800 transition-colors border border-red-900 shadow-lg active:scale-95 flex items-center justify-center" aria-label="一鍵清除所有畫面號碼">
            <span class="material-icons-round text-2xl">delete_sweep</span>
        </button>
    </div>

    <div @click="completeCurrent" class="w-[65%] h-full flex flex-col items-center justify-center border-r border-stone-800 relative bg-stone-900 z-10 cursor-pointer active:bg-stone-800 transition-colors group">
        <div class="absolute top-10 text-stone-500 tracking-[0.5em] text-sm uppercase opacity-50">Current Call</div>
        <p class="text-3xl mb-2 font-light tracking-widest text-stone-500">現點現做，感謝耐心等候🙌🙇‍♀️</p>
        
        <h1 :key="currentNumber" class="text-[28vw] leading-none font-bold serif text-yellow-400 number-pop group-hover:scale-105 transition-transform" 
            style="text-shadow: 0 0 60px rgba(250, 204, 21, 0.6);">
            {{ currentNumber || '--' }}
        </h1>
        
        <div class="mt-8">
            <span v-if="currentNumber" class="text-4xl text-stone-200 bg-white/10 px-12 py-5 rounded-full backdrop-blur-md animate-pulse flex items-center gap-3 shadow-lg">
                <span class="material-icons-round text-yellow-400 text-4xl">lightbulb</span>請至櫃台取餐
            </span>
            <span v-else class="text-3xl text-stone-600 tracking-wider">
                美味準備中...
            </span>
        </div>
    </div>

    <div class="w-[35%] h-full bg-stone-950 flex flex-col min-h-0">
        <div class="p-6 bg-stone-900 border-b border-stone-800 shadow-md z-20 flex-shrink-0">
            <h2 class="text-2xl font-bold text-white tracking-wider flex items-center gap-3">
                <span class="material-icons-round text-brick">restaurant_menu</span>以下號碼皆可取餐
            </h2>
            <p class="text-sm text-stone-500 tracking-wider flex items-center gap-1 mt-3 bg-stone-800/50 w-max px-3 py-1.5 rounded-lg border border-stone-700/50"> 
                <span class="material-icons-round text-[16px] text-stone-400">touch_app</span> 也可至自己的手機點餐畫面確認
            </p>
        </div>

        <div class="flex-1 overflow-y-auto p-6 relative no-scrollbar">
            <transition-group name="list" tag="div" class="grid grid-cols-1 gap-4">
                <div v-for="order in recentDoneOrders" :key="order.key" 
                    @click="handleCardTap(order)"
                    class="group bg-stone-800/80 border border-stone-700 rounded-2xl p-5 flex items-center justify-between hover:bg-stone-800 transition-colors w-full cursor-pointer relative overflow-hidden flex-shrink-0 active:scale-95 duration-200 shadow-sm">
                    
                    <div class="flex flex-col px-1">
                        <span class="text-6xl font-bold text-stone-200 serif mb-2 tracking-tighter">#{{ order.number }}</span>
                        <span class="text-xs text-stone-500 bg-stone-900 px-3 py-1 rounded-full border border-stone-800 w-max tracking-widest">{{ order.timeString }}</span>
                    </div>

                    <button @click.stop="reCall(order.number)" class="w-16 h-16 bg-stone-700/50 hover:bg-stone-600 rounded-full transition-colors flex items-center justify-center border border-stone-600 shadow-md active:scale-90">
                        <span class="material-icons-round text-4xl text-stone-300">campaign</span>
                    </button>

                </div>
            </transition-group>
            
            <div v-if="recentDoneOrders.length === 0" class="absolute inset-0 flex items-center justify-center text-stone-600">
                <p class="text-xl tracking-widest font-bold">目前無待取餐號碼</p>
            </div>
            <div class="h-20"></div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-[65%] bg-brick/10 border-t border-brick/20 py-3 z-20 pointer-events-none backdrop-blur-sm">
        <p class="text-center text-lg tracking-widest text-stone-400">現點現做，請耐心等候 🥣</p>
    </div>

</div>

<script type="module">
    import { createApp, ref, computed, onMounted, watch } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref as dbRef, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCrXoKUHMvQ8LMr_YuaQYTWEdLfWFYeLYY",
        authDomain: "jiantou-000rlhad.firebaseapp.com",
        databaseURL: "https://jiantou-000rlhad-default-rtdb.firebaseio.com",
        projectId: "jiantou-000rlhad",
        storageBucket: "jiantou-000rlhad.firebasestorage.app",
        messagingSenderId: "435285773521",
        appId: "1:435285773521:web:d6ce66a7d35bf3bbd049f0"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    createApp({
        setup() {
            const currentNumber = ref(null);
            const doneOrders = ref([]);
            const isMuted = ref(true);
            
            // 用來辨識雙擊魔法的計時器
            let globalTapTimer = null;
            let globalTapTarget = null;

            const toggleMute = () => {
                isMuted.value = !isMuted.value;
                if (!isMuted.value) {
                    const audio = document.getElementById('dingSound');
                    if (audio) {
                        audio.volume = 1;
                        audio.play().then(() => {
                            audio.pause();
                            audio.currentTime = 0;
                        }).catch(e => console.log('解鎖音效失敗', e));
                    }
                    const unlockSpeech = new SpeechSynthesisUtterance(' ');
                    window.speechSynthesis.speak(unlockSpeech);
                }
            };

            onMounted(() => {
                const callRef = dbRef(db, 'currentCallingNumber');
                onValue(callRef, (snapshot) => { currentNumber.value = snapshot.val(); });

                const ordersRef = dbRef(db, 'orders');
                onValue(ordersRef, (snapshot) => {
                    const data = snapshot.val();
                    const list = [];
                    
                    // ✨ 嚴格限制：只抓取今天的訂單（隔天自動清空） ✨
                    const todayStr = `${new Date().getFullYear()}/${(new Date().getMonth()+1).toString().padStart(2,'0')}/${new Date().getDate().toString().padStart(2,'0')}`;

                    if (data) {
                        Object.keys(data).forEach(key => {
                            const order = data[key];
                            if (order.status === 'done' && order.dateString === todayStr && !order.isAddon) {
                                list.push({ ...order, key: key });
                            }
                        });
                    }
                    list.sort((a, b) => b.createdAt - a.createdAt);
                    
                    // 去除重複顯示的同號碼
                    const uniqueNumbers = new Map();
                    list.forEach(o => {
                        if (!uniqueNumbers.has(o.number)) uniqueNumbers.set(o.number, o);
                    });
                    doneOrders.value = Array.from(uniqueNumbers.values());
                });
            });

            watch(currentNumber, (newVal) => {
                if (newVal && !isMuted.value) {
                    const audio = document.getElementById('dingSound');
                    if(audio) { audio.play().catch(() => {}); }

                    setTimeout(() => {
                        const spacedNumber = String(newVal).split('').join(' ');
                        const speechText = `${spacedNumber} 號，請至櫃檯取餐`;
                        const utterance = new SpeechSynthesisUtterance(speechText);
                        utterance.lang = 'zh-TW';
                        utterance.rate = 0.85;  
                        utterance.pitch = 1.2;  
                        window.speechSynthesis.speak(utterance);
                    }, 1000); 
                }
            });

            const recentDoneOrders = computed(() => {
                return doneOrders.value.filter(o => o.number != currentNumber.value);
            });

            const reCall = (number) => { set(dbRef(db, 'currentCallingNumber'), number); };

            const finishOrder = (order) => {
                const updates = {};
                doneOrders.value.forEach(o => {
                    if (o.number === order.number) {
                        updates[`orders/${o.key}/status`] = 'archived';
                    }
                });
                update(dbRef(db), updates);
            };

            // ✨ 魔法雙擊判定邏輯 ✨
            const handleCardTap = (order) => {
                // 如果短時間內點了第二次同一個卡片，就觸發刪除
                if (globalTapTimer && globalTapTarget === order.key) {
                    clearTimeout(globalTapTimer);
                    globalTapTimer = null;
                    globalTapTarget = null;
                    finishOrder(order);
                } else {
                    // 點第一次，啟動 0.3 秒的計時器
                    globalTapTarget = order.key;
                    globalTapTimer = setTimeout(() => {
                        globalTapTimer = null;
                        globalTapTarget = null;
                        // 單擊什麼都不做，因為廣播功能已經移到專屬喇叭按鈕了
                    }, 300); 
                }
            };

            const completeCurrent = () => {
                if (!currentNumber.value) return;
                const targets = doneOrders.value.filter(o => o.number == currentNumber.value);
                if (targets.length > 0) {
                    const updates = {};
                    targets.forEach(order => { updates[`orders/${order.key}/status`] = 'archived'; });
                    updates['currentCallingNumber'] = null;
                    update(dbRef(db), updates);
                } else {
                    set(dbRef(db, 'currentCallingNumber'), null);
                }
            };

            // ✨ 一鍵清空大掃把 (左右兩邊全部一起清) ✨
            const clearAll = () => {
                if(confirm("確定要清除畫面上所有的取餐號碼嗎？\n（包含左邊正在叫的，與右邊等待的，都會一起結案清除喔！）")) {
                    const updates = {};
                    updates['currentCallingNumber'] = null; // 清除左邊
                    doneOrders.value.forEach(o => {
                        updates[`orders/${o.key}/status`] = 'archived'; // 清除右邊
                    });
                    update(dbRef(db), updates).then(() => {
                        currentNumber.value = null;
                    });
                }
            };

            const toggleFullScreen = () => {
                const doc = window.document;
                const docEl = doc.documentElement;
                const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullscreen || docEl.msRequestFullscreen;
                const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

                if(!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                    if(requestFullScreen) requestFullScreen.call(docEl);
                } else {
                    if(cancelFullScreen) cancelFullScreen.call(doc);
                }
            };

            return { 
                currentNumber, recentDoneOrders, reCall, completeCurrent, 
                isMuted, finishOrder, toggleFullScreen, toggleMute, clearAll, handleCardTap
            };
        }
    }).mount('#app');
</script>
</body>
</html>
